name: Secure CI Pipeline

on:
    push:
        branches: [ "main" ]

env:
    IMAGE_NAME: secure-app
    REGISTRY: docker.io/shadab256

jobs:
    build-scan-sign:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v3

            - name: Build Docker Image
              run: |
                docker build -t $REGISTRY/$IMAGE_NAME:${{ github.sha }} ./app
                
            - name: Scan Image with Trivy
              uses: aquasecurity/trivy-action@master
              with:
                image-ref: $REGISTRY/$IMAGE_NAME:${{ github.sha }}
                format: 'table'
                exit-code: '1'
                severity: 'CRICTICAL,HIGH'

            - name: Install Cosign
              uses: sigstore/cosign-installer@v3

            - name: Login to Dockerhub
              run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            - name: Push Image
              run: |
                docker push $REGISTRY/$IMAGE_NAME:${{ github.sha }}

            - name: Sign Image with Cosign
              run: |
                cosign sign --key env://COSIGN_PRIVATE_KEY $REGISTRY/$IMAGE_NAME:${{ github.sha }}
              env:
                COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}

            - name: Update Kubarnetes Manifest Image Tag
              run: |
                sed -i "s|image:.*|image: $REGISTRY/$IMAGE_NAME:${{ github.sha }}|g" k8s/base/deployment.yaml

            - name: Commit & Push Changes
              run: |
                git config --global user.email "shadab@devsecops.com"
                git config --global user.name "Shadab"
                git add .
                git commit -m "Update image tag to ${{ github.sha }}"
                git push
              

        