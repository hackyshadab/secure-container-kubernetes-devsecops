apiVersion: kyverno.io/v1
kind: ClusterPolicy
Metadata:
  name: verify-image-signature

spec:
  validationFailureAction: enforce
  rules:
  - name: check-image-signature
    match:
      resources:
        kinds:
        - Pod

    verifyImages:
    - image: "docker.io/shadab256/*"
      key: "cosign.pub"
      