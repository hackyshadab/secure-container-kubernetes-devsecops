apiVersion: apps/v1
kind: Deployment
metadata:
  name: secure-app
  namespace: default
  labels: 
    app: secure-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: secure-app

  template:
    metadata:
      labels:
        app: secure-app

    spec:
      serviceAccountName: app-sa

      containers:
      - name: secure-app
        image: docker.io/shadab256/secure-app:94ce1bcdfb29f240274a4c614301ba27b9a171be
        ports:
        - containerPort: 5000

        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false

          